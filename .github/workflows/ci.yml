name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  agent-tests:
    name: Testes do motor (agent)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Libs de sistema (opencv headless)
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0

      - name: Instala o motor + deps de teste
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Roda os testes
        run: pytest -q

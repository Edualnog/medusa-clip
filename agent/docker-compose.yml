# Sobe o worker na VPS:  docker compose up -d --build
# Precisa de um arquivo .env ao lado (ver .env.example) com SUPABASE_URL,
# SUPABASE_SERVICE_ROLE_KEY e KEY_ENCRYPTION_SECRET (os mesmos do web).
services:
  worker:
    build: .
    env_file: .env
    environment:
      # cookies do YouTube (conta logada) montados read-only; opcional.
      YTDLP_COOKIES: /cookies/youtube.txt
    restart: unless-stopped
    volumes:
      - whisper-cache:/cache/huggingface
      # arquivo de cookies vive na VPS (fora do git/imagem), montado read-only
      - /opt/zorothax/cookies:/cookies:ro

volumes:
  whisper-cache:

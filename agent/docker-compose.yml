# Sobe o worker na VPS:  docker compose up -d --build
# Precisa de um arquivo .env ao lado (ver .env.example) com SUPABASE_URL,
# SUPABASE_SERVICE_ROLE_KEY e KEY_ENCRYPTION_SECRET (os mesmos do web).
services:
  worker:
    build: .
    env_file: .env
    environment:
      # cookies do YouTube (conta logada) montados read-only; opcional.
      YTDLP_COOKIES: /cookies/youtube.txt
      # provider de PO token (servico irmao) — yt-dlp pega o token pra baixar do YouTube
      YTDLP_POT_BASEURL: http://pot-provider:4416
    restart: unless-stopped
    depends_on:
      - pot-provider
    volumes:
      - whisper-cache:/cache/huggingface
      # cookies vivem na VPS (fora do git/imagem). READ-ONLY: o worker usa uma copia
      # por job (o yt-dlp reescreveria e degradaria o original). Mantem a fonte intacta.
      - /opt/zorothax/cookies:/cookies:ro

  # Gera PO tokens pro yt-dlp (necessario pra baixar YouTube de IP de datacenter).
  pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:1.3.1
    restart: unless-stopped

volumes:
  whisper-cache:

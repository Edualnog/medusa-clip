# Sobe o worker na VPS:  docker compose up -d --build
# Precisa de um arquivo .env ao lado (ver .env.example) com SUPABASE_URL,
# SUPABASE_SERVICE_ROLE_KEY, KEY_ENCRYPTION_SECRET e R2_* (os mesmos do web).
#
# Fonte de video: Drive/Dropbox/upload (.mp4) — funcionam direto. YouTube-link
# precisa de proxy residencial / PO-token+cookies; o codigo ja suporta via env
# (YTDLP_PROXY / YTDLP_POT_BASEURL / YTDLP_COOKIES), desligado por enquanto.
services:
  worker:
    build: .
    env_file: .env
    restart: unless-stopped
    volumes:
      - whisper-cache:/cache/huggingface

volumes:
  whisper-cache:
